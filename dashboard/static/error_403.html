<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OQENS | 403 Forbidden</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --text-muted: #737373;
            --border-color: #eeeeee;
            --accent: #111111;
            --accent-hover: #333333;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            text-align: center;
            max-width: 440px;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-code {
            font-size: 6.5rem;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -3px;
            margin-bottom: 15px;
            color: var(--accent);
        }
        .error-title {
            font-size: 1.35rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            margin-bottom: 12px;
        }
        .error-desc {
            font-size: 0.92rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            background-color: var(--accent);
            color: #ffffff;
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            border-radius: 6px;
            transition: background-color 0.2s ease;
        }
        .btn-home:hover {
            background-color: var(--accent-hover);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">403</div>
        <h1 class="error-title">Access Forbidden</h1>
        <p class="error-desc">You do not have permission to access this resource or application. If you believe this is an error, please contact your workspace administrator.</p>
        <a href="https://oqens.me" class="btn-home">Back to OQENS Home</a>
    </div>
</body>
</html>
