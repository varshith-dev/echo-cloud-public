<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OQENS | Setup Host Password</title>
    <link rel="stylesheet" type="text/css" href="/static/phosphor/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --text-primary: #111111;
            --text-secondary: #555555;
            --border-color: #eaeaea;
            --accent-blue: #2563eb;
            --red: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle, #e5e5e5 1px, transparent 1px);
            background-size: 24px 24px;
            padding: 24px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.88rem;
            color: var(--text-secondary);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.15s ease;
            background: #fafafa;
        }

        .form-input:focus {
            border-color: var(--text-primary);
            background: #ffffff;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--text-primary);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .alert-box {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--red);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.88rem;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1 id="setup-title">Configure Account Password</h1>
            <p id="setup-subtitle">Set a secure password to activate your account details.</p>
        </div>
        
        <div class="alert-box" id="error-box"></div>

        <div class="form-group" id="name-group" style="display: none;">
            <label id="name-label">Display Name</label>
            <input type="text" id="display-name" class="form-input" placeholder="Enter display name...">
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="password" class="form-input" placeholder="Min. 8 characters...">
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm-password" class="form-input" placeholder="Repeat password...">
        </div>

        <button class="btn-submit" onclick="submitPassword()">Set Password</button>
    </div>

    <script>
        let userRole = '';

        function showError(msg) {
            const el = document.getElementById('error-box');
            el.innerText = msg;
            el.style.display = 'block';
        }

        // On Load, fetch token details
        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (!token) {
                return showError("Missing token. Please request another setup email.");
            }

            try {
                const res = await fetch(`/api/auth/setup-details?token=${token}`);
                const data = await res.json();
                if (res.ok) {
                    userRole = data.role;
                    if (userRole === 'host') {
                        document.getElementById('setup-title').innerText = "Configure Host Password";
                        document.getElementById('setup-subtitle').innerText = "Set a secure password to activate your Super Host dashboard.";
                        document.getElementById('name-group').style.display = 'none';
                    } else if (userRole === 'tenant') {
                        document.getElementById('setup-title').innerText = "Configure Tenant Account";
                        document.getElementById('setup-subtitle').innerText = "Setup your secure password and tenant display details.";
                        document.getElementById('name-label').innerText = "Tenant Username";
                        document.getElementById('display-name').value = data.name;
                        document.getElementById('name-group').style.display = 'flex';
                    } else if (userRole === 'support') {
                        document.getElementById('setup-title').innerText = "Configure Agent Details";
                        document.getElementById('setup-subtitle').innerText = "Setup your secure password and support display details.";
                        document.getElementById('name-label').innerText = "Agent Display Name";
                        document.getElementById('display-name').value = data.name;
                        document.getElementById('name-group').style.display = 'flex';
                    }
                } else {
                    showError(data.error || "Setup token is invalid or has expired.");
                    document.querySelector('.btn-submit').disabled = true;
                }
            } catch (e) {
                showError("Could not retrieve setup details. Please check connection.");
            }
        });

        async function submitPassword() {
            const pass = document.getElementById('password').value;
            const conf = document.getElementById('confirm-password').value;
            const displayNameEl = document.getElementById('display-name');
            const nameVal = displayNameEl ? displayNameEl.value.trim() : '';
            
            if (!pass || !conf) {
                return showError("Please fill in all fields.");
            }
            if (pass.length < 8) {
                return showError("Password must be at least 8 characters.");
            }
            if (pass !== conf) {
                return showError("Passwords do not match.");
            }

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (!token) {
                return showError("Missing token. Please request another setup email.");
            }

            const btn = document.querySelector('.btn-submit');
            btn.disabled = true;
            btn.innerText = "Configuring...";

            try {
                const payload = { token, password: pass };
                if (userRole === 'tenant') {
                    payload.username = nameVal;
                } else if (userRole === 'support') {
                    payload.name = nameVal;
                }

                const res = await fetch('/api/auth/setup-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (res.ok) {
                    alert(data.message || "Password setup successfully! Redirecting to login...");
                    window.location.href = data.redirect || "/login";
                } else {
                    showError(data.error || "Failed to setup password.");
                    btn.disabled = false;
                    btn.innerText = "Set Password";
                }
            } catch (e) {
                showError("Connection error. Try again.");
                btn.disabled = false;
                btn.innerText = "Set Password";
            }
        }
    </script>
</body>
</html>
