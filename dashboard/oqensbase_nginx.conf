# HTTP redirection block (Redirects all HTTP to HTTPS)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# 1. Main Echo / Admin / DL Portal HTTPS block
server {
    listen 443 ssl;
    server_name echo.oqens.me host.echo.oqens.me dl.oqens.me;

    ssl_certificate /etc/letsencrypt/live/echo.oqens.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/echo.oqens.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

